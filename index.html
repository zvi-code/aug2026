<!DOCTYPE html>
<html lang="he" dir="rtl"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>מתכנן טיול</title>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" media="(prefers-color-scheme:light)" content="#F2F2F7"/>
<meta name="theme-color" media="(prefers-color-scheme:dark)" content="#000000"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="מסע 2026"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ===== design tokens ===== */
 :root{
  color-scheme:light dark;
  --brand:#007AFF; --brand-2:#5AC8FA; --brand-d:#0062CC; --brand-tx:#007AFF;
  --ink-blue:#0040A0; --link:#007AFF; --green:#34C759; --green-tx:#248A3D; --gold:#FF9F0A;
  --c-day:#FF3B30; --c-in:#34C759; --c-out:#FF9500; --c-air:#8E8E93;
  --bg:#F2F2F7; --card:#FFFFFF; --card-2:#F7F7FB;
  --ink:#1C1C1E; --ink-2:#6C6C70; --ink-3:#8E8E93; --ink-4:#C7C7CC;
  --line:#E5E5EA; --line-2:#E5E5EA; --input-bd:#D1D1D6; --hover:#EFEFF4;
  --fill-blue:#EAF2FF; --fill-blue-2:#EAF2FF; --chip-ink:#0A66D6;
  --warn-bg:#FFF4E0; --warn-bg2:#FFF4E0; --warn-bd:#FFE3B0; --warn-ink:#8A5A00;
  --ok-bg:#E7F9EE; --ok-bd:#C9EFD6; --ok-ink:#248A3D;
  --r-s:8px; --r-m:12px; --r-l:16px; --tap:44px;
  --radius-card:16px; --radius-btn:12px; --radius-field:10px; --pill:980px;
  --shadow-card:0 1px 1px rgba(0,0,0,.04),0 8px 20px rgba(0,0,0,.06);
  --shadow-pop:0 10px 34px rgba(0,0,0,.18);
  --blur:saturate(180%) blur(20px);
  --bar-bg:rgba(248,248,250,.72); --hair:rgba(60,60,67,.16); --accent-soft:rgba(0,122,255,.12);
 }
 @media (prefers-color-scheme:dark){:root{
  --brand:#0A84FF; --brand-2:#64D2FF; --brand-d:#0A84FF; --brand-tx:#0A84FF;
  --ink-blue:#9FC4FF; --link:#0A84FF; --green:#30D158; --green-tx:#30D158; --gold:#FF9F0A;
  --c-day:#FF453A; --c-in:#30D158; --c-out:#FF9F0A; --c-air:#8E8E93;
  --bg:#000000; --card:#1C1C1E; --card-2:#2C2C2E;
  --ink:#FFFFFF; --ink-2:#AEAEB2; --ink-3:#8E8E93; --ink-4:#636366;
  --line:#38383A; --line-2:#38383A; --input-bd:#48484A; --hover:#2C2C2E;
  --fill-blue:#0E2747; --fill-blue-2:#0E2747; --chip-ink:#7FB1FF;
  --warn-bg:#3A2E12; --warn-bg2:#3A2E12; --warn-bd:#5A4A22; --warn-ink:#FFD480;
  --ok-bg:#0E2A18; --ok-bd:#1E4D33; --ok-ink:#30D158;
  --shadow-card:0 1px 1px rgba(0,0,0,.5),0 10px 26px rgba(0,0,0,.55);
  --shadow-pop:0 12px 40px rgba(0,0,0,.6);
  --bar-bg:rgba(18,18,20,.7); --hair:rgba(84,84,88,.5); --accent-soft:rgba(10,132,255,.18);
 }}
 /* leaflet popups follow tokens */
 .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--card);color:var(--ink)}
 .leaflet-popup-content{color:var(--ink)} .leaflet-popup-close-button{color:var(--ink-3)}
 /* a11y focus */
 a:focus-visible,button:focus-visible,input:focus-visible,[role=button]:focus-visible,.tab:focus-visible,.poi:focus-visible,.leg-h:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:4px}
 /* touch targets */
 .tab{min-height:var(--tap)}
 .btn,.tc-btn,#lockbtn{min-height:var(--tap)}
 .fctl a{min-width:40px;min-height:40px;line-height:40px}
 .tc-toggle{min-height:40px}
 /* collapsible legend */
 .legend-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
 .legend-ttl{font-weight:bold;font-size:11.5px;color:var(--ink-2)}
 .legend-x{appearance:none;border:0;background:var(--hover);color:var(--ink-2);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;flex:none}
 .legend-x:hover{filter:brightness(.95)}
 .legend-fab{display:none}
 .legend.min{padding:0;background:transparent;box-shadow:none}
 .legend.min .legend-hd,.legend.min .legend-body{display:none}
 .legend.min .legend-fab{display:flex;align-items:center;justify-content:center;width:var(--tap);height:var(--tap);border-radius:50%;border:0;background:var(--card);color:inherit;box-shadow:0 1px 6px rgba(0,0,0,.3);cursor:pointer;font-size:20px}
 *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;color:var(--ink)}
 #wrap{display:flex;height:100%}
 #side{width:390px;min-width:0;height:100%;overflow-y:auto;background:var(--bg);border-left:1px solid var(--line-2)}
 #map{flex:1;height:100%}
 .head{background:var(--brand);color:#fff;padding:12px 14px;position:relative}
 .head h1{margin:0;font-size:17px} .head .sub{font-size:12px;opacity:.85;margin-top:2px}
 .head a{color:#bfe0ff}
 .redbar{margin-top:8px;font-size:11.5px;background:var(--warn-bg2);color:var(--warn-ink);border:1px solid var(--warn-bd);border-radius:6px;padding:5px 8px;line-height:1.5}
 .redbar.ok{background:var(--ok-bg);color:var(--ok-ink);border-color:var(--ok-bd)}
 .unlockbtn{margin-inline-start:8px;font:inherit;font-size:11.5px;cursor:pointer;background:var(--brand);color:#fff;border:0;border-radius:5px;padding:3px 10px;white-space:nowrap}
 .unlockbtn:hover{background:var(--brand-d)}
 #lockscreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:flex;align-items:center;justify-content:center;padding:18px}
 #lockbox{background:var(--card);border-radius:14px;box-shadow:0 10px 44px rgba(0,0,0,.4);padding:26px 22px;max-width:340px;width:100%;text-align:center;direction:rtl}
 #lockbox .lk{font-size:42px;line-height:1;margin-bottom:6px}
 #lockbox h2{margin:0 0 5px;font-size:18px;color:var(--brand-tx)}
 #lockbox p{margin:0 0 16px;font-size:13px;color:var(--ink-3);line-height:1.55}
 #lockpass{width:100%;font-size:16px;padding:11px 12px;border:1px solid var(--input-bd);border-radius:8px;text-align:center;direction:ltr;letter-spacing:1px}
 #lockpass:focus{outline:none;border-color:var(--brand)}
 #lockbtn{width:100%;margin-top:10px;font:inherit;font-size:15px;font-weight:bold;cursor:pointer;background:var(--brand);color:#fff;border:0;border-radius:8px;padding:11px}
 #lockbtn:hover{background:var(--brand-d)} #lockbtn:disabled{opacity:.6;cursor:default}
 #lockerr{color:#c0392b;font-size:12px;margin-top:9px;min-height:15px}
 #lockrem{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:11px;font-size:12.5px;color:var(--ink-3);cursor:pointer;user-select:none;direction:rtl}
 #lockrem input{accent-color:var(--brand);width:16px;height:16px;margin:0;flex:none}
 #lockor{display:flex;align-items:center;gap:10px;margin:12px 0 10px;color:var(--ink-4);font-size:11.5px}
 #lockor:before,#lockor:after{content:"";flex:1;border-top:1px solid var(--hair,#ddd)}
 #lockgoog{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;font:inherit;font-size:14.5px;font-weight:600;cursor:pointer;background:#fff;color:#3c4043;border:1px solid var(--input-bd,#dadce0);border-radius:8px;padding:10px;direction:rtl}
 #lockgoog:hover{background:#f8f9fa} #lockgoog:disabled{opacity:.6;cursor:default}
 #lockgoog .gic{width:19px;height:19px;flex:none}
 #lockgis{display:flex;justify-content:center;margin-top:10px;min-height:0}
 #lockgis:empty{margin:0}
 .filters{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
 .filters label{font-size:11.5px;background:rgba(255,255,255,.15);padding:3px 7px;border-radius:12px;cursor:pointer;user-select:none}
 .filters input{vertical-align:middle;margin-left:4px}
 .leg{border-bottom:1px solid var(--line)}
 .leg-h{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer}
 .leg-h:hover{background:var(--hover)}
 .badge{flex:none;width:27px;height:27px;border-radius:50%;background:var(--brand);color:#fff;
   font-weight:bold;text-align:center;line-height:27px;font-size:13px}
 .badge.day{background:var(--c-day)} .badge.air{background:var(--c-air)}
 .leg-t{flex:1} .leg-t .nm{font-weight:bold;font-size:14px} .leg-t .mt{font-size:11.5px;color:var(--ink-3)}
 .chev{color:var(--ink-4);transition:transform .2s;font-size:12px}
 .leg.open .chev{transform:rotate(90deg)}
 .body{display:none;padding:0 13px 12px} .leg.open .body{display:block}
 .lodge{font-size:12px;background:var(--fill-blue);border-radius:6px;padding:6px 8px;margin:2px 0 8px}
 .lodge a{color:var(--link);text-decoration:none;white-space:nowrap}
 .day{font-size:12px;margin:5px 0;padding-right:8px;border-right:2px solid var(--line)}
 .day b{color:var(--brand-tx)}
 .info{font-size:11.5px;color:var(--ink-3);margin:6px 0;font-style:italic}
 .poi{display:flex;align-items:flex-start;gap:7px;padding:6px 5px;border-radius:6px;cursor:pointer}
 .poi:hover{background:var(--hover)}
 .pdot{flex:none;width:11px;height:11px;border-radius:50%;margin-top:3px}
 .pnm{font-size:13px;font-weight:bold} .pmeta{font-size:11.5px;color:var(--ink-3)}
 .plinks{margin-top:2px} .plinks a{font-size:11.5px;color:var(--link);margin-left:8px;text-decoration:none}
 .sech{font-size:11.5px;color:var(--ink-4);margin:10px 0 3px;font-weight:bold}
 .legend{position:absolute;bottom:12px;right:12px;z-index:500;background:var(--card);padding:8px 10px;
   border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.3);font-size:11.5px;direction:rtl}
 .legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-left:5px}
 .num-marker{color:#fff;border:2px solid #fff;border-radius:50%;width:26px;height:26px;line-height:26px;
   text-align:center;font-weight:bold;box-shadow:0 1px 4px rgba(0,0,0,.45);font-size:13px;background:var(--brand)}
 .num-marker.day{background:var(--c-day)}.num-marker.air{background:var(--c-air)}
 .fllbl{transform:translate(-50%,-50%);white-space:nowrap;background:#ffffff;border:1.5px solid var(--ink-4);
   border-radius:10px;padding:0 6px;font-size:11.5px;font-weight:700;color:#333;box-shadow:0 1px 3px rgba(0,0,0,.35)}
 .aflag{transform:translate(-50%,-165%);white-space:nowrap;display:inline-flex;align-items:center;gap:3px;
   background:#ffffff;border:2px solid var(--ink-4);border-radius:11px;padding:1px 7px;font-size:13px;font-weight:800;
   box-shadow:0 2px 5px rgba(0,0,0,.35)} .aflag b{font-size:11.5px;letter-spacing:.3px}
 .aflag.in{border-color:var(--c-in);color:#0E6B57} .aflag.out{border-color:var(--c-out);color:#B5601A}
 .aflag.home{border-color:var(--brand);color:#1F4E79} .aflag.hub{border-color:var(--ink-4);color:#666}
 .fctl a{font-size:15px;text-align:center;cursor:pointer} .fctl a.on{background:var(--fill-blue-2)}
 .leaflet-popup-content{direction:rtl;text-align:right;font-size:13px} .leaflet-popup-content b{font-size:14px}
 .leaflet-popup-content a{color:var(--link)}
 .topt{margin:8px 0 2px}
 .topt-h{font-size:12px;color:var(--brand-tx);font-weight:bold;cursor:pointer;user-select:none;
   background:var(--fill-blue-2);border-radius:6px;padding:6px 8px}
 .topt-h .cv{font-size:11.5px;color:var(--ink-3);transition:transform .2s;display:inline-block;margin-left:3px}
 .topt.open .topt-h .cv{transform:rotate(90deg)}
 .topt-body{display:none;margin-top:5px} .topt.open .topt-body{display:block}
 .anote{font-size:11.5px;color:var(--warn-ink);background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:6px;padding:5px 8px;margin:4px 0}
 .tcard{position:relative;border:1px solid var(--line);border-radius:7px;padding:6px 9px;margin:5px 0;background:var(--card);cursor:pointer}
 .tcard:hover{background:var(--hover)}
 .tcard .tnm{font-size:13px;font-weight:bold}
 .tcard .trate{position:absolute;left:8px;top:6px;font-size:11.5px;color:var(--gold);font-weight:bold}
 .tcard .tmeta{font-size:11.5px;color:var(--ink-2);margin-top:1px}
 .tcard .tx{font-size:11.5px;margin-top:2px} .tcard .tx.acc{color:var(--warn-ink)} .tcard .tx.aug{color:var(--ink-3)}
 .tcard .tlinks{margin-top:3px} .tcard .tlinks a{font-size:11.5px;color:var(--link);margin-left:9px;text-decoration:none}
 .tdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-left:5px;vertical-align:middle}
 .bkg{margin:6px 0 2px}
 .bkg-h{font-size:12px;color:var(--green-tx);font-weight:bold;cursor:pointer;user-select:none;
   background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:6px;padding:6px 8px}
 .bkg-h .cv{font-size:11.5px;color:var(--green-tx);transition:transform .2s;display:inline-block;margin-left:3px}
 .bkg.open .bkg-h .cv{transform:rotate(90deg)}
 .bkg-body{display:none;margin-top:5px;background:var(--card);border:1px solid var(--line);border-radius:7px;padding:8px 10px}
 .bkg.open .bkg-body{display:block}
 .bkg-row{font-size:12px;margin:3px 0;line-height:1.5}
 .bkg-row .k{color:var(--ink-4);margin-left:4px}
 .bkg-times{display:flex;gap:8px;margin:5px 0}
 .bkg-times .t{flex:1;background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:6px;padding:5px 7px;font-size:11.5px;text-align:center;color:var(--ink-3)}
 .bkg-times .t b{display:block;font-size:15px;color:var(--green-tx);margin-top:1px}
 .bkg-conf{background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:6px;padding:5px 8px;font-size:12px;margin:5px 0}
 .bkg-sec{font-size:11.5px;color:var(--warn-ink);margin:7px 0 1px;font-weight:bold}
 .bkg a{color:var(--link);text-decoration:none}
 .bkg .plat{display:inline-block;font-size:11.5px;background:var(--fill-blue);border:1px solid var(--line);border-radius:10px;padding:1px 7px;color:var(--chip-ink);margin-left:4px}
 .bkg .room{font-size:11.5px;color:var(--ink-2);margin:2px 0;padding-right:8px;border-right:2px solid var(--ok-bd)}
 .bkg .muted{font-size:11.5px;color:var(--ink-2)}
 .drivesum{border-bottom:1px solid var(--line);background:var(--card)}
 .ds-h{font-size:13px;font-weight:bold;color:var(--brand-tx);cursor:pointer;padding:10px 13px;user-select:none}
 .ds-h .cv{font-size:11.5px;color:var(--ink-3);display:inline-block;transition:transform .2s;margin-left:4px}
 .drivesum.open .ds-h .cv{transform:rotate(90deg)}
 .ds-body{display:none;padding:0 13px 10px} .drivesum.open .ds-body{display:block}
 .ds-row{display:flex;justify-content:space-between;gap:8px;align-items:center;font-size:12px;padding:5px 7px;border-radius:6px;cursor:pointer}
 .ds-row:hover{background:var(--hover)}
 .ds-row .ds-leg{color:var(--ink)} .ds-row.dt .ds-leg{color:#9a3b38}
 .ds-row .ds-meta{color:var(--brand-tx);font-weight:bold;white-space:nowrap} .ds-row.dt .ds-meta{color:var(--c-day)}
 .ds-total{font-size:12px;font-weight:bold;color:var(--green-tx);background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:6px;padding:6px 8px;margin-top:6px;text-align:center}
 .ds-hint{font-size:11.5px;color:var(--ink-4);margin:4px 2px 0;text-align:center}
 .trtoggle{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--green-tx);cursor:pointer;user-select:none;background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:12px;padding:2px 9px;margin-left:8px}
 .trtoggle input{margin:0;vertical-align:middle}
 .tcard .tx.route{color:var(--green-tx);font-weight:bold}
 /* === Trip Companion engagement layer === */
 .topbar{position:sticky;top:0;z-index:6}
 .prof{position:absolute;top:9px;left:11px;display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);
   border:1px solid rgba(255,255,255,.32);border-radius:14px;padding:2px 9px 2px 3px;cursor:pointer;font-size:12px;color:#fff;max-width:46%;overflow:hidden}
 .prof .av{flex:none;width:21px;height:21px;border-radius:50%;background:#ffffff;color:var(--brand);font-size:13px;line-height:21px;text-align:center}
 .prof span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .prof:hover{background:rgba(255,255,255,.3)}
 .tabbar{display:flex;background:var(--brand-d);overflow-x:auto;scrollbar-width:none}
 .tabbar::-webkit-scrollbar{display:none}
 .tab{flex:1 0 auto;background:none;border:0;color:#bfe0ff;font:inherit;font-size:12px;font-weight:bold;
   padding:9px 13px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent}
 .tab:hover{background:rgba(255,255,255,.07)} .tab.active{color:#fff;border-bottom-color:var(--gold);background:rgba(255,255,255,.1)}
 .view{display:none} .view.active{display:block}
 .vh{font-size:15px;font-weight:bold;color:var(--brand-tx);padding:12px 14px 2px}
 .vsub{font-size:12px;color:var(--ink-3);padding:2px 14px 8px;line-height:1.5}
 .btn{display:inline-block;font:inherit;font-size:12px;font-weight:bold;cursor:pointer;background:var(--brand);color:#fff;
   border:0;border-radius:8px;padding:8px 12px;text-decoration:none;text-align:center}
 .btn:hover{filter:brightness(.92)} .btn.g{background:var(--green)} .btn.o{background:var(--gold)}
 .navbtns{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
 .cd{margin:10px 14px;background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 3px 12px rgba(31,78,121,.25)}
 .cd .lbl{font-size:12px;opacity:.85} .cd .big{font-size:44px;font-weight:bold;line-height:1.05;margin:3px 0} .cd .small{font-size:13px;opacity:.95}
 .tcd{margin:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px}
 .tcd h4{margin:0 0 6px;font-size:14px;color:var(--brand-tx)} .tcd .row{font-size:12px;margin:4px 0;color:var(--ink)} .tcd .row b{color:var(--brand-tx)} .tcd a{color:var(--link)}
 .pk-bar{height:9px;background:var(--line);border-radius:5px;overflow:hidden;margin:4px 14px 4px} .pk-bar>i{display:block;height:100%;background:var(--green);width:0;transition:width .25s}
 .pk-cat{margin:9px 14px 1px;font-size:13px;font-weight:bold;color:var(--brand-tx)}
 .pk-item{display:flex;align-items:center;gap:8px;font-size:13px;margin:1px 14px;padding:5px 7px;border-radius:6px;cursor:pointer}
 .pk-item:hover{background:var(--hover)} .pk-item input{margin:0;flex:none} .pk-item.ess .pk-t::after{content:' ★';color:var(--gold);font-size:11.5px}
 .pk-item.on .pk-t{text-decoration:line-through;color:var(--ink-4)}
 .pk-add{display:flex;gap:6px;margin:8px 14px} .pk-add input{flex:1;font:inherit;font-size:12px;padding:7px 8px;border:1px solid var(--input-bd);border-radius:7px}
 .scorebar{display:flex;align-items:center;gap:10px;margin:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 13px}
 .scorebar .sc{font-size:32px;font-weight:bold;color:var(--green-tx);line-height:1} .scorebar .scl{font-size:11.5px;color:var(--ink-3)}
 .badges{display:flex;gap:5px;margin-inline-start:auto} .badge2{font-size:23px;filter:grayscale(1) opacity(.3)} .badge2.on{filter:none}
 .bicat{font-size:12px;font-weight:bold;color:var(--brand-tx);margin:11px 14px 2px}
 .bi{display:flex;align-items:center;gap:9px;font-size:13px;margin:3px 14px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--card);cursor:pointer}

/* ============ Apple-style skin (appended; last-wins) ============ */
*{-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.01em;background:var(--bg)}
#side{background:var(--bg);border-left:.5px solid var(--hair);-webkit-overflow-scrolling:touch}
.topbar{background:var(--bar-bg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-bottom:.5px solid var(--hair)}
.head{background:transparent;color:var(--ink);padding:14px 16px 9px}
.head h1{font-size:18px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
.ttl-flag{font-size:13px;opacity:.55;filter:grayscale(.3) saturate(.85);flex:none;line-height:1}
.head .sub{color:var(--ink-3);opacity:1;font-size:12.5px}
.head a{color:var(--brand-tx);text-decoration:none;font-weight:600}
.prof{top:12px;left:13px;background:var(--hover);border:.5px solid var(--hair);color:var(--ink-2);border-radius:var(--pill);padding:3px 11px 3px 4px;box-shadow:none}
.prof .av{background:var(--brand);color:#fff}
.prof:hover{background:var(--accent-soft)}
.prof.prof-empty{padding:6px;gap:0;border-radius:50%}
.prof.prof-empty .prof-ic{width:16px;height:16px;color:var(--ink-2);margin:0}
.prof.prof-empty:hover .prof-ic{color:var(--brand)}
.filters{gap:7px}
.filters label{background:var(--hover);color:var(--ink-2);border:.5px solid var(--hair);border-radius:var(--pill);padding:5px 11px;font-weight:600}
.filters input{accent-color:var(--brand)}
.tabbar{background:transparent;border-bottom:.5px solid var(--hair);padding:1px 8px 0;gap:2px}
.tab{color:var(--ink-3);font-weight:600;font-size:13px;background:transparent;border-radius:0;border-bottom:2px solid transparent;padding:10px 11px}
.tab:hover{background:transparent;color:var(--ink-2)}
.tab.active{color:var(--brand);background:transparent;border-bottom:2px solid var(--brand)}
.tcd,.exp,.bi,.scorebar,.album,.fcard{border:.5px solid var(--hair);border-radius:var(--radius-card);box-shadow:var(--shadow-card)}
.exp,.fcard{overflow:hidden}
.tcard{border:.5px solid var(--hair);border-radius:13px;box-shadow:none}
.fl{border:.5px solid var(--hair);border-radius:13px}
.drivesum{border-bottom:0;margin:11px 12px;background:var(--card);border:.5px solid var(--hair);border-radius:var(--radius-card);box-shadow:var(--shadow-card);overflow:hidden}
.leg{border-bottom:0;margin:11px 12px;background:var(--card);border:.5px solid var(--hair);border-radius:var(--radius-card);box-shadow:var(--shadow-card);overflow:hidden}
.leg-h{padding:13px 15px}
.leg-h:hover{background:var(--hover)}
.cd{border:0;border-radius:var(--radius-card);box-shadow:var(--shadow-card)}
.btn{border-radius:var(--radius-btn);font-weight:600;box-shadow:none;transition:transform .12s ease,filter .12s ease}
.btn:hover{filter:brightness(1.06)} .btn:active{transform:scale(.97)}
.chip{border-radius:var(--pill)}
.nearbar a{background:var(--accent-soft);border:0;color:var(--brand-tx);border-radius:var(--pill);font-weight:600}
.lodge{background:var(--hover);border-radius:12px}
#lockpass,#pf-name,.modal-box input{border:.5px solid var(--input-bd);border-radius:var(--radius-field);background:var(--card);color:var(--ink)}
#lockpass:focus,#pf-name:focus,.modal-box input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px var(--accent-soft)}
#lockbox,.modal-box{border-radius:22px;box-shadow:var(--shadow-pop)}
#lockbtn{border-radius:var(--radius-btn);font-weight:600}
.legend{background:var(--bar-bg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:.5px solid var(--hair);border-radius:16px;box-shadow:var(--shadow-pop)}
.legend-fab,.tc-toggle{background:var(--bar-bg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:.5px solid var(--hair);box-shadow:var(--shadow-pop)}
.tc-panel{border-radius:16px;border:.5px solid var(--hair);box-shadow:var(--shadow-pop)}
.tc-toggle{border-radius:var(--pill)}
.dot-lodge{background:var(--brand)} .dot-day{background:var(--c-day)}
.leaflet-popup-content-wrapper{border-radius:16px;box-shadow:var(--shadow-pop)}
.leaflet-bar,.leaflet-control-layers{border:.5px solid var(--hair)!important;border-radius:13px!important;box-shadow:var(--shadow-pop)!important;overflow:hidden}
.leaflet-bar a{background:var(--card);color:var(--ink);border-bottom:.5px solid var(--hair)}
.leaflet-bar a:hover{background:var(--hover)}
.leaflet-control-layers{background:var(--card);color:var(--ink)}
.bi,.tcard,.poi{transition:background .15s ease,transform .12s ease}
.bi:active,.tcard:active,.poi:active{transform:scale(.99)}
a:focus-visible,button:focus-visible,input:focus-visible,[role=button]:focus-visible,.tab:focus-visible,.leg-h:focus-visible{outline:2px solid var(--brand);outline-offset:2px}

/* ===== Clean line icons (SF-style) for controls ===== */
.ic{display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;width:20px;height:20px;flex:none}
.tab .ic{width:17px;height:17px;margin-inline-start:5px;vertical-align:-3px}
.head a .ic{width:15px;height:15px;margin-inline-start:4px;vertical-align:-2px}
.prof .av{display:inline-flex;align-items:center;justify-content:center}
.prof .av .ic{width:13px;height:13px}
.fctl a{display:flex;align-items:center;justify-content:center}
.fctl a .ic{width:20px;height:20px}
.fctl a.on{color:var(--brand)}
.tc-toggle .ic{width:17px;height:17px;margin-inline-start:6px;vertical-align:-3px}
.legend-fab .ic{width:22px;height:22px}
.legend-x{display:inline-flex;align-items:center;justify-content:center}
.legend-x .ic{width:15px;height:15px}
#lockbox .lk .ic{width:44px;height:44px;stroke-width:1.5;color:var(--brand)}
#lockbtn .ic{width:16px;height:16px;margin-inline-start:7px;vertical-align:-3px}
/* thin chevrons replace heavy disclosure triangles */
.cv,.chev{font-size:0!important;line-height:0}
.cv::after,.chev::after{content:"";display:inline-block;width:7px;height:7px;border-right:1.7px solid currentColor;border-bottom:1.7px solid currentColor;border-radius:1px;transform:rotate(-45deg);vertical-align:middle}
/* ===== Games tab ===== */
.gmenu{display:flex;flex-direction:column;gap:10px;margin:8px 14px 18px}
.gcard{display:flex;align-items:center;gap:12px;text-align:start;width:100%;background:var(--card);border:.5px solid var(--hair);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:13px;cursor:pointer;font:inherit;color:var(--ink);transition:transform .12s}
.gcard:active{transform:scale(.985)}
.gc-ic{flex:none;width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--accent-soft);border-radius:13px}
.gc-tx{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.gc-t{font-weight:700;font-size:15px}
.gc-d{font-size:12px;color:var(--ink-3);line-height:1.35}
.gc-f{flex:none;font-size:11.5px;font-weight:700;color:var(--brand-tx);white-space:nowrap;align-self:flex-start}
.g-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:.5px solid var(--hair);margin-bottom:8px}
.g-back{display:inline-flex;align-items:center;gap:2px;font:inherit;font-weight:600;font-size:13px;color:var(--brand-tx);background:none;border:0;cursor:pointer;padding:4px 2px}
.g-back .ic{width:18px;height:18px}
.g-title{font-weight:700;font-size:15px;color:var(--ink);flex:1}
.g-new{font:inherit;font-size:12px;font-weight:600;color:var(--brand-tx);background:var(--accent-soft);border:0;border-radius:var(--pill);padding:6px 12px;cursor:pointer}
.g-wrap{padding:0 14px 18px}
.g-center{text-align:center;padding-top:22px}
.g-big{font-size:54px;line-height:1.1}
.g-res{font-size:30px;font-weight:800;color:var(--brand-tx);margin-top:6px}
.g-sub{font-size:13px;color:var(--ink-3);margin:6px 0 18px}
.g-win{font-size:15px;font-weight:700;color:var(--green-tx);margin:8px 0 10px}
/* trivia */
.g-prog{font-size:12px;color:var(--ink-3);margin:4px 0 10px;font-weight:600}
.trq{font-size:17px;font-weight:700;line-height:1.45;margin-bottom:13px}
.tropts{display:flex;flex-direction:column;gap:9px}
.tropt{font:inherit;font-size:15px;text-align:start;background:var(--card);border:.5px solid var(--hair);border-radius:12px;box-shadow:var(--shadow-card);padding:13px 14px;cursor:pointer;color:var(--ink);transition:transform .1s;min-height:46px}
.tropt:active{transform:scale(.99)}
.tropt:disabled{cursor:default}
.tropt.ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-ink);font-weight:700}
.tropt.bad{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn-ink)}
.trfb{margin-top:14px;display:flex;flex-direction:column;gap:11px;align-items:stretch}
.fb-ok{color:var(--green-tx);font-weight:700}
.fb-bad{color:var(--ink-2)}
/* sudoku */
.su-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:2px 0 10px}
.su-diffs{display:flex;gap:6px}
.su-diff{font:inherit;font-size:12px;font-weight:600;padding:6px 11px;border-radius:var(--pill);border:.5px solid var(--hair);background:var(--hover);color:var(--ink-2);cursor:pointer}
.su-diff.on{background:var(--brand);color:#fff;border-color:transparent}
.su-time{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink-2);font-size:15px}
.su-board{display:grid;grid-template-columns:repeat(9,1fr);max-width:380px;margin:0 auto;aspect-ratio:1/1;background:var(--card);border:1.6px solid var(--ink-3);border-radius:10px;overflow:hidden;direction:ltr}
.su-c{font:inherit;font-size:clamp(15px,5vw,20px);font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--card);color:var(--brand-tx);border:.5px solid var(--line);cursor:pointer;aspect-ratio:1/1;-webkit-appearance:none;appearance:none}
.su-c.fix{color:var(--ink);font-weight:800}
.su-c.br{border-inline-end:1.6px solid var(--ink-3)}
.su-c.bb{border-bottom:1.6px solid var(--ink-3)}
.su-c.peer{background:var(--hover)}
.su-c.same{background:var(--accent-soft);font-weight:800}
.su-c.bad{color:#e5484d;background:rgba(229,72,77,.14)}
.su-c.sel{box-shadow:inset 0 0 0 2.5px var(--brand);border-radius:3px;position:relative;z-index:1}
.su-hint{font-size:11.5px;color:var(--ink-3);text-align:center;margin:9px auto 0;max-width:360px;line-height:1.45}
.su-pad{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:380px;margin:11px auto 0;direction:ltr}
.su-k{font:inherit;font-size:18px;font-weight:700;padding:12px 0;min-height:46px;border-radius:11px;border:.5px solid var(--hair);background:var(--card);box-shadow:var(--shadow-card);color:var(--ink);cursor:pointer;transition:transform .1s}
.su-k:active{transform:scale(.96)}
.su-er{color:var(--ink-2)}
.su-msg{text-align:center;margin-top:14px}
/* tafzoret */
.tz-hint{font-size:12px;color:var(--ink-3);margin:2px 0 8px;line-height:1.4}
.tz-board{display:grid;gap:3px;max-width:400px;margin:4px auto;direction:ltr;user-select:none;-webkit-user-select:none;touch-action:none}
.tz-c{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:var(--card);border:.5px solid var(--hair);border-radius:7px;font-size:clamp(13px,4.2vw,18px);font-weight:600;color:var(--ink);cursor:pointer}
.tz-c.sel{background:var(--accent-soft);color:var(--brand-tx)}

.tz-words{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:13px 0 0}
.tz-w{font-size:13px;font-weight:600;background:var(--hover);border:.5px solid var(--hair);border-radius:var(--pill);padding:5px 11px;color:var(--ink-2)}
.tz-w.done{background:var(--ok-bg);color:var(--ok-ink);border-color:var(--ok-bd);text-decoration:line-through}
/* ===== Map collapse / split / big-map layout ===== */
#side,#map{transition:width .22s ease,height .22s ease}
#wrap[data-layout="panel"] #map{display:none}
#wrap[data-layout="panel"] #side{width:100%}
#wrap[data-layout="map"] #side{display:none}
#wrap{position:relative}
#showpanel{display:none}
#wrap[data-layout="map"] #showpanel{display:inline-flex;align-items:center;gap:6px;position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);left:50%;transform:translateX(-50%);z-index:1200;background:var(--bar-bg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:.5px solid var(--hair);border-radius:var(--pill);box-shadow:var(--shadow-pop);padding:7px 14px;font:inherit;font-weight:700;font-size:13px;color:var(--ink);cursor:pointer}
#showpanel .ic{width:16px;height:16px}
/* ===== Draggable splitter between panel and map ===== */

let cdTimer=null;
function startCountdown(){
  if(cdTimer){ clearInterval(cdTimer); cdTimer=null; }

    const big=document.getElementById('cd-d'), small=document.getElementById('cd-s');
    if(!big){ clearInterval(cdTimer); cdTimer=null; return; }
    const ms=new Date(DATA.trip.depart)-new Date();
    if(ms<=0){ renderToday(); return; }
    const d=Math.floor(ms/864e5), hh=Math.floor(ms%864e5/36e5), mm=Math.floor(ms%36e5/6e4), ss=Math.floor(ms%6e4/1e3);
    big.textContent=d; small.textContent='ימים · '+hh+' שע׳ '+mm+' דק׳ '+ss+' שנ׳';

/* ===== Weather (Open-Meteo, key-less). Only the STOP coordinates — already public
   itinerary data — are sent; the user's own GPS position never leaves the device.
   Last forecast is kept in localStorage so it renders offline (the SW deliberately
   does not cache this API). ===== */
var WX={data:null,t:0};
function wxLoad(){ try{ var o=JSON.parse(localStorage.getItem('tc.wx')||'null'); if(o&&o.data) WX=o; }catch(_){ } }
function wxSave(){ try{ localStorage.setItem('tc.wx',JSON.stringify(WX)); }catch(_){ } }
function wxFetch(){
  if(WX.data && (Date.now()-WX.t)<3*36e5) return Promise.resolve(true);
  var lats=DATA.legs.map(function(l){return l.lat;}).join(','), lngs=DATA.legs.map(function(l){return l.lng;}).join(',');
  var u='https://api.open-meteo.com/v1/forecast?latitude='+lats+'&longitude='+lngs+
        '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max'+
        '&current=temperature_2m,weather_code&timezone=auto&forecast_days=16';
  return fetch(u).then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(j){
    WX={data:Array.isArray(j)?j:[j],t:Date.now()}; wxSave(); return true;
  }).catch(function(){ return !!WX.data; });
}
function wxSym(c){
  if(c===0) return ['☀️','בהיר']; if(c===1) return ['🌤️','בהיר ברובו'];
  if(c===2) return ['⛅','מעונן חלקית']; if(c===3) return ['☁️','מעונן'];
  if(c===45||c===48) return ['🌫️','ערפל'];
  if(c>=51&&c<=57) return ['🌦️','טפטוף']; if(c>=61&&c<=67) return ['🌧️','גשם'];
  if(c>=71&&c<=77) return ['🌨️','שלג']; if(c>=80&&c<=82) return ['🌧️','ממטרים'];
  if(c===85||c===86) return ['🌨️','ממטרי שלג']; if(c>=95) return ['⛈️','סופות רעמים'];
  return ['🌡️',''];
}
function isoDay(d){ var p=function(n){return (n<10?'0':'')+n;}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function wxDayName(iso){ return ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'][new Date(iso+'T12:00:00').getDay()]; }
function wxDaysHTML(w,d0,d1,max){
  if(!w||!w.daily||!w.daily.time) return '';
  var t=w.daily.time, idx=[];
  for(var i=0;i<t.length;i++){ if(d0&&t[i]<d0) continue; if(d1&&t[i]>d1) continue; idx.push(i); if(idx.length>=(max||6)) break; }
  if(!idx.length) return '';
  var h='<div class="wx-days">';
  idx.forEach(function(i){ var sym=wxSym(w.daily.weather_code[i]), pp=w.daily.precipitation_probability_max[i];
    h+='<div class="wx-day"><div class="d">'+wxDayName(t[i])+' '+t[i].slice(8,10)+'.'+parseInt(t[i].slice(5,7),10)+'</div><div class="e">'+sym[0]+'</div>'+
       '<div>'+Math.round(w.daily.temperature_2m_max[i])+'°<span style="color:var(--ink-4)">/'+Math.round(w.daily.temperature_2m_min[i])+'°</span></div>'+
       (pp>=20?'<div style="color:#1E90FF">💧'+pp+'%</div>':'')+'</div>'; });
  return h+'</div>';
}
function wxInnerHTML(){
  var h='<div class="wx-h">🌤️ מזג אוויר</div>';

    if(nseg){ var ni=DATA.legs.findIndex(function(l){return l.name===nseg.to;});
      if(ni>=0){ var days=wxDaysHTML(WX.data[ni],DATA.legs[ni].d0,DATA.legs[ni].d0,1);
        if(days) h+='<div class="wx-row" style="margin-top:3px"><span class="wx-nm">בהמשך: <b>'+DATA.legs[ni].he+'</b> (יום ההגעה)</span></div>'+days; } }
  } else if(now<depart){
    h+='<div class="muted2" style="margin-bottom:5px">ככה זה מרגיש עכשיו בתחנות המסע · התחזית לימי הטיול תופיע כאן עד 16 יום לפני כל תאריך.</div>';
    DATA.legs.forEach(function(lg,i){ if(lg.type!=='stay') return;
      var w=WX.data[i]; if(!w||!w.current) return; var sym=wxSym(w.current.weather_code);
      var hi=w.daily?Math.round(w.daily.temperature_2m_max[0]):null, lo=w.daily?Math.round(w.daily.temperature_2m_min[0]):null;
      h+='<div class="wx-row"><span class="wx-em">'+sym[0]+'</span><span class="wx-nm">'+(lg.explore&&lg.explore.emoji?lg.explore.emoji+' ':'')+lg.he+'</span>'+
         (hi!=null?'<span class="wx-hilo">'+lo+'°–'+hi+'°</span>':'')+'<span class="wx-t">'+Math.round(w.current.temperature_2m)+'°</span></div>'; });
  } else return h+'<div class="muted2">המסע הסתיים 🏠</div>';
  h+='<div class="wx-upd">עודכן '+new Date(WX.t).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})+' · Open-Meteo.com</div>';
  return h;
}

/* ===== Location (on-device only — the position is never sent to any server; nav
   links pass the DESTINATION to the maps app, not where you are). ===== */
function havKm(a,b,c,d){ var p=Math.PI/180, x=Math.sin((c-a)*p/2), y=Math.sin((d-b)*p/2);
  return 2*6371*Math.asin(Math.sqrt(x*x+Math.cos(a*p)*Math.cos(c*p)*y*y)); }
function getPos(){ return new Promise(function(res,rej){
  if(!navigator.geolocation) return rej(new Error('unsupported'));
  navigator.geolocation.getCurrentPosition(function(p){ res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy||0}); },
    rej,{enableHighAccuracy:true,timeout:12000,maximumAge:30000});
}); }
function distToPoly(lat,lng,geo){
  var lens=[],tot=0,i;
  for(i=1;i<geo.length;i++){ var L2=havKm(geo[i-1][0],geo[i-1][1],geo[i][0],geo[i][1]); lens.push(L2); tot+=L2; }
  var best={d:1e9,frac:0,km:tot},acc=0,p=Math.PI/180;
  for(i=1;i<geo.length;i++){
    var a=geo[i-1],b=geo[i],kx=Math.cos(a[0]*p)*111.32,ky=111.13;
    var bx=(b[1]-a[1])*kx,by=(b[0]-a[0])*ky,px=(lng-a[1])*kx,py=(lat-a[0])*ky;
    var l2=bx*bx+by*by,t=l2?Math.max(0,Math.min(1,(px*bx+py*by)/l2)):0;
    var dx=px-t*bx,dy=py-t*by,d=Math.sqrt(dx*dx+dy*dy);
    if(d<best.d){ best.d=d; best.frac=tot?(acc+t*lens[i-1])/tot:0; }
    acc+=lens[i-1];
  }
  return best;
}
function locCardHTML(){
  return '<div class="wx" id="loccard"><div class="wx-h">📍 איפה אנחנו?</div>'+
    '<div id="locbody"><div class="muted2">כמה נשאר לנסיעה? כמה רחוקה הלינה? המיקום נבדק במכשיר בלבד — ולא נשלח לשום מקום.</div></div>'+
    '<div class="navbtns" style="margin-top:8px"><button class="btn" id="locbtn">📍 בדקו איפה אנחנו</button></div></div>';
}
function locResultHTML(p){
  var best=null, near=null;
  (DATA.segments||[]).forEach(function(s){ if(!s.geo||s.geo.length<2) return;
    var r=distToPoly(p.lat,p.lng,s.geo); if(!best||r.d<best.r.d) best={s:s,r:r}; });
  DATA.legs.forEach(function(l){ if(l.type!=='stay'&&l.type!=='daytrip') return;
    var d=havKm(p.lat,p.lng,l.lat,l.lng); if(!near||d<near.d) near={l:l,d:d}; });
  var h='';
  // Being AT a stop trumps "on the road" — every drive segment starts/ends at a stop,
  // so someone standing at the lodging is always within a few meters of a route too.
  if(near&&near.d<2) best=null;
  if(best&&best.r.d<3){
    var s=best.s,frac=best.r.frac,km=s.mi*1.60934,leftKm=km*(1-frac),leftMin=Math.round(s.min*(1-frac)),pc=Math.round(frac*100);
    h+='<div class="row" style="font-weight:600">🚗 בדרך: '+s.from_he+' ← '+s.to_he+'</div>'+
       '<div class="loc-bar"><div class="loc-fill" style="width:'+pc+'%"></div><span class="loc-car" style="left:'+pc+'%">🚗</span></div>'+
       '<div class="row">עברנו '+Math.round(km-leftKm)+' ק״מ ('+pc+'%) · נשארו <b>'+Math.round(leftKm)+' ק״מ</b> · ~'+fmtDur(leftMin)+'</div>';
    var dest=legByName(s.to);
    if(dest) h+='<div class="navbtns"><a class="btn g" target="_blank" href="'+navUrl(dest.lat,dest.lng)+'">🧭 נווטו ליעד</a></div>';
  } else {
    if(near&&near.d>500){
      h+='<div class="row">🌍 אתם '+Math.round(near.d).toLocaleString('he-IL')+' ק״מ מהתחנה הקרובה ('+near.l.he+') — עוד מעט ממריאים! ✈️</div>';
    } else if(near){
      h+='<div class="row">📌 התחנה הקרובה: <b>'+near.l.he+'</b> · '+(near.d<1?Math.round(near.d*1000)+' מ׳':near.d.toFixed(1)+' ק״מ')+' מכם</div>'+
         '<div class="navbtns"><a class="btn" target="_blank" href="'+navUrl(near.l.lat,near.l.lng)+'">🧭 נווטו לשם</a></div>';
    }
  }
  return h+'<div class="wx-upd">דיוק ~'+Math.round(p.acc)+' מ׳ · המיקום לא נשלח לשום שרת</div>';
}

function quizStartTimer(){ quizStopTimer(); QZ.timer=setInterval(function(){ QZ.tleft--; var t=document.getElementById('qz-time'); if(t) t.textContent='0:'+('0'+Math.max(0,QZ.tleft)).slice(-2); if(QZ.tleft<=0){ quizStopTimer(); if(!QZ.answered) quizAns(-1); } },1000); }
function quizStopTimer(){ if(QZ.timer){ clearInterval(QZ.timer); QZ.timer=null; } }
function quizAns(i){

/* ---------- Sudoku ---------- */
var SU_p=[], SU_sol=[], SU_fixed=[], SU_sel=-1, SU_diff='easy', SU_t0=0, SU_timer=null;
function suOk(g,r,c,n){ var i; for(i=0;i<9;i++){ if(g[r*9+i]===n) return false; if(g[i*9+c]===n) return false; } var br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3, x,y; for(y=0;y<3;y++) for(x=0;x<3;x++) if(g[(br+y)*9+(bc+x)]===n) return false; return true; }
function suFill(g){ var p=g.indexOf(0); if(p<0) return true; var r=Math.floor(p/9), c=p%9, nums=gShuffle([1,2,3,4,5,6,7,8,9]), k; for(k=0;k<9;k++){ var n=nums[k]; if(suOk(g,r,c,n)){ g[p]=n; if(suFill(g)) return true; g[p]=0; } } return false; }
function suCount(g,cap){ var c=0; (function rec(){ if(c>=cap) return; var p=g.indexOf(0); if(p<0){ c++; return; } var r=Math.floor(p/9), col=p%9, n; for(n=1;n<=9 && c<cap;n++){ if(suOk(g,r,col,n)){ g[p]=n; rec(); g[p]=0; } } })(); return c; }
function suGen(diff){
  var full=[]; var i; for(i=0;i<81;i++) full.push(0); suFill(full);
  var target = diff==='hard'?30:(diff==='medium'?36:46);
  var puz=full.slice(); var cells=gShuffle(full.map(function(_,k){return k;})); var given=81;
  for(i=0;i<cells.length && given>target;i++){ var idx=cells[i], bak=puz[idx]; if(bak===0) continue; puz[idx]=0; var test=puz.slice(); if(suCount(test,2)!==1) puz[idx]=bak; else given--; }
  return {puz:puz, sol:full};
}
function openSudoku(diff){
  SU_diff=diff||SU_diff||'easy';
  var gg=suGen(SU_diff); SU_p=gg.puz.slice(); SU_sol=gg.sol; SU_fixed=gg.puz.map(function(v){return v!==0;}); SU_sel=-1;
  SU_t0=Date.now(); suRender(); suStartTimer();
}
function suRender(){
  var el=gv(); var h=gameHead("סודוקו");
  h+='<div class="g-wrap"><div class="su-top"><div class="su-diffs">';
  var names={easy:'קל',medium:'בינוני',hard:'קשה'};
  ['easy','medium','hard'].forEach(function(d){ h+='<button class="su-diff'+(d===SU_diff?' on':'')+'" data-d="'+d+'">'+names[d]+'</button>'; });
  h+='</div><div class="su-time" id="su-time">0:00</div></div>';
  h+='<div class="su-board" id="su-board">';
  var i; for(i=0;i<81;i++){ var row=Math.floor(i/9), col=i%9, cls='su-c'; if(col%3===2&&col!==8) cls+=' br'; if(row%3===2&&row!==8) cls+=' bb'; if(SU_fixed[i]) cls+=' fix'; h+='<button class="'+cls+'" data-i="'+i+'">'+(SU_p[i]?SU_p[i]:'')+'</button>'; }
  h+='</div><div class="su-pad">';
  var n; for(n=1;n<=9;n++) h+='<button class="su-k" data-n="'+n+'">'+n+'</button>';
  h+='<button class="su-k su-er" data-n="0">⌫</button></div>';
  h+='<div class="su-hint">בחרו תא ואז ספרה · אפשר גם להקליד במקלדת (1–9, ⌫ למחיקה, חיצים לניווט). תאים עם אותו מספר מודגשים.</div>';
  h+='<div class="su-msg" id="su-msg"></div></div>';
  el.innerHTML=h; wireBack(el);
  el.querySelectorAll('.su-diff').forEach(function(b){ b.addEventListener('click',function(){ openSudoku(b.dataset.d); }); });
  el.querySelectorAll('.su-c').forEach(function(b){ b.addEventListener('click',function(){ SU_sel=+b.dataset.i; suHi(); }); });
  el.querySelectorAll('.su-k').forEach(function(b){ b.addEventListener('click',function(){ suKey(+b.dataset.n); }); });

/* ---------- Jigsaw (פאזל תמונה) — real CC0 public-domain art ---------- */
var JG_N={easy:3,medium:4,hard:5,expert:6};
var JG={diff:'easy',img:null,n:3,order:[],sel:-1,t0:0,timer:null,cat:'all'};

function jigNew(){ JG.n=JG_N[JG.diff]; var k=JG.n*JG.n; JG.order=gShuffle(Array.apply(null,{length:k}).map(function(_,i){return i;})); var ok=true,i; for(i=0;i<k;i++) if(JG.order[i]!==i) ok=false; if(ok) JG.order.reverse(); JG.sel=-1; JG.t0=Date.now(); jigRender(); jigStartTimer(); }

function jigRender(){
  var el=gv(); if(!el) return;
  if(!JG.img){ el.innerHTML=gameHead("פאזל")+'<div class="g-wrap"><div class="g-sub">אין תמונות זמינות במצב לא־מקוון.</div></div>'; wireBack(el); return; }
  var n=JG.n, cats=jigCats();
  var h=gameHead("פאזל",'<button class="g-new" id="jg-new">תמונה חדשה</button>');
  h+='<div class="g-wrap"><div class="su-top">'+diffBar(GTIERS,JG.diff)+'<div class="su-time" id="jg-time">0:00</div></div>';
  if(cats.length>1){ h+='<div class="su-diffs jg-cats"><button class="su-diff'+(JG.cat==='all'?' on':'')+'" data-jc="all">הכול</button>'; cats.forEach(function(c){ h+='<button class="su-diff'+(JG.cat===c?' on':'')+'" data-jc="'+c+'">'+(c==='art'?'אמנות':c==='nature'?'טבע':c)+'</button>'; }); h+='</div>'; }

// --- offline tile saver + GPX/KML waypoint export ---
function lon2tile(lon,z){ return Math.floor((lon+180)/360*Math.pow(2,z)); }
function lat2tile(lat,z){ const r=lat*Math.PI/180; return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z)); }
function tripPoints(){
  const pts=[];
  (DATA.legs||[]).forEach(function(lg){ if(lg.type==='flight') return;
    pts.push({lat:lg.lat,lng:lg.lng,name:(lg.he||lg.name||''),desc:(lg.lodging||''),cat:'lodge'});
    (lg.pois||[]).forEach(function(p){ pts.push({lat:p.lat,lng:p.lng,name:p.name,desc:[p.diff,p.stats,p.note].filter(Boolean).join(' · '),cat:p.cat}); });
  });
  const ap=DATA.airports||{}; Object.keys(ap).forEach(function(k){ const a=ap[k]; pts.push({lat:a.lat,lng:a.lng,name:k+' · '+(a.he||''),desc:(a.note||''),cat:'air'}); });
  return pts;
}
function buildTileSet(key){
  const s=TILESRC[key], seen={}, out=[];
  function add(z,x,y){ if(x<0||y<0) return; const id=z+'/'+x+'/'+y; if(!seen[id]){ seen[id]=1; out.push([z,x,y]); } }
  const pts=tripPoints().filter(function(p){ return p.lng>=-125&&p.lng<=-113&&p.lat>=31&&p.lat<=43; });
  const PLAN=[[9,0],[10,0],[11,1],[12,1],[13,1],[14,1]];
  pts.forEach(function(p){ PLAN.forEach(function(zr){ const z=zr[0]; if(z>s.max) return; const r=zr[1];
    const cx=lon2tile(p.lng,z), cy=lat2tile(p.lat,z);
    for(let dx=-r;dx<=r;dx++) for(let dy=-r;dy<=r;dy++) add(z,cx+dx,cy+dy);
  }); });
  let mnLat=90,mxLat=-90,mnLng=180,mxLng=-180;
  pts.forEach(function(p){ if(p.lat<mnLat)mnLat=p.lat; if(p.lat>mxLat)mxLat=p.lat; if(p.lng<mnLng)mnLng=p.lng; if(p.lng>mxLng)mxLng=p.lng; });
  for(let z=6;z<=8;z++){ const x0=lon2tile(mnLng,z),x1=lon2tile(mxLng,z),y0=lat2tile(mxLat,z),y1=lat2tile(mnLat,z);
    for(let x=x0;x<=x1;x++) for(let y=y0;y<=y1;y++) add(z,x,y); }
  return out;
}
async function downloadOffline(key,onp){
  const s=TILESRC[key]; if(!s.off||!s.url) throw new Error('layer not offline-allowed');
  if(navigator.storage&&navigator.storage.persist){ try{ await navigator.storage.persist(); }catch(_){} }
  const tiles=buildTileSet(key), cache=await caches.open('tc-tiles');
  let done=0,ok=0,fail=0,i=0; const total=tiles.length, CONC=5;
  async function worker(){ while(i<tiles.length){ const t=tiles[i++], url=s.url(t[0],t[1],t[2]);
    try{ const hit=await cache.match(url); if(!hit){ const r=await fetch(url,{mode:'no-cors'}); await cache.put(url,r); } ok++; }catch(e){ fail++; }
    done++; if(onp&&(done%6===0||done===total)) onp(done,total,ok,fail);
  } }
  const ws=[]; for(let w=0;w<CONC;w++) ws.push(worker()); await Promise.all(ws);
  return {total:total,ok:ok,fail:fail};
}
function escXml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
const GSYM={lodge:'Lodging',hike:'Trail Head',water:'Swimming Area',sight:'Scenic Area',park:'Park',air:'Airport'};
function buildGPX(){ const pts=tripPoints(); let g='<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="aug2026 trip planner" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>USA West Coast · Aug 2026</name></metadata>\n';
  pts.forEach(function(p){ g+='  <wpt lat="'+p.lat+'" lon="'+p.lng+'"><name>'+escXml(p.name)+'</name>'+(p.desc?'<desc>'+escXml(p.desc)+'</desc>':'')+'<sym>'+(GSYM[p.cat]||'Dot')+'</sym></wpt>\n'; });
  return g+'</gpx>\n'; }
function buildKML(){ const pts=tripPoints(); let k='<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>USA West Coast · Aug 2026</name>\n';
  pts.forEach(function(p){ k+='<Placemark><name>'+escXml(p.name)+'</name>'+(p.desc?'<description>'+escXml(p.desc)+'</description>':'')+'<Point><coordinates>'+p.lng+','+p.lat+',0</coordinates></Point></Placemark>\n'; });
  return k+'</Document></kml>\n'; }
function dlFile(name,text,mime){ const b=new Blob([text],{type:mime||'text/plain'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(u); a.remove(); },1500); }

function greatCircle(a,b,n){
  n=n||64; const R=Math.PI/180, D=180/Math.PI;
  const la1=a[0]*R, lo1=a[1]*R, la2=b[0]*R, lo2=b[1]*R;
  const dd=2*Math.asin(Math.sqrt(Math.pow(Math.sin((la2-la1)/2),2)+Math.cos(la1)*Math.cos(la2)*Math.pow(Math.sin((lo2-lo1)/2),2)));
  if(!dd) return [a,b];
  const pts=[];
  for(let i=0;i<=n;i++){
    const f=i/n, A=Math.sin((1-f)*dd)/Math.sin(dd), B=Math.sin(f*dd)/Math.sin(dd);
    const x=A*Math.cos(la1)*Math.cos(lo1)+B*Math.cos(la2)*Math.cos(lo2);
    const y=A*Math.cos(la1)*Math.sin(lo1)+B*Math.cos(la2)*Math.sin(lo2);
    const z=A*Math.sin(la1)+B*Math.sin(la2);
    pts.push([Math.atan2(z,Math.sqrt(x*x+y*y))*D, Math.atan2(y,x)*D]);
  }
  return pts;
}

// map-focus restore button (returns full-screen map to split view)
var __sp=document.getElementById('showpanel'); if(__sp) __sp.addEventListener('click',function(){ window.__preLyt=undefined; setLayout('split'); });
(function initSplit(){
  var wrap=document.getElementById('wrap'), side=document.getElementById('side'), sp=document.getElementById('splitter');
  if(!wrap||!side||!sp) return;
  var KEY='tc.split';
  function isVert(){ return window.matchMedia('(max-width:720px)').matches; }
  function getSaved(){ try{ return JSON.parse(localStorage.getItem(KEY))||{}; }catch(_){ return {}; } }
  function setSaved(v){ try{ localStorage.setItem(KEY, JSON.stringify(v)); }catch(_){ } }
  function applySaved(){
    if(wrap.dataset.layout!=='split'){ side.style.width=''; side.style.height=''; return; }
    var v=getSaved(), r=wrap.getBoundingClientRect();
    if(isVert()){ side.style.width=''; if(v.h){ var h=Math.min(parseFloat(v.h), r.height-150); side.style.height=(h>110)?h+'px':''; } else side.style.height=''; }
    else { side.style.height=''; if(v.w){ var ww=Math.min(parseFloat(v.w), r.width-220); side.style.width=(ww>150)?ww+'px':''; } else side.style.width=''; }
  }
  window.__applySplit=applySaved;
  var dragging=false, vert=false, raf=0;
  function onMove(e){
    if(!dragging) return;
    var r=wrap.getBoundingClientRect();
    if(vert){ var h=e.clientY-r.top; h=Math.max(110,Math.min(r.height-150,h)); side.style.height=h+'px'; side.style.width=''; }
    else { var w=r.right-e.clientX; w=Math.max(150,Math.min(r.width-220,w)); side.style.width=w+'px'; side.style.height=''; }
    if(!raf) raf=requestAnimationFrame(function(){ raf=0; try{ map.invalidateSize(); }catch(_){ } });
  }
  function onUp(e){
    if(!dragging) return; dragging=false; wrap.classList.remove('dragging');
    try{ sp.releasePointerCapture(e.pointerId); }catch(_){ }
    var v=getSaved(); if(vert) v.h=side.style.height; else v.w=side.style.width; setSaved(v);
    try{ map.invalidateSize(); }catch(_){ }
  }
  sp.addEventListener('pointerdown',function(e){
    if(wrap.dataset.layout!=='split') return;
    dragging=true; vert=isVert(); wrap.classList.add('dragging');
    try{ sp.setPointerCapture(e.pointerId); }catch(_){ }
    e.preventDefault();
  });
  window.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',onUp);
  window.addEventListener('pointercancel',onUp);
  sp.addEventListener('dblclick',function(){ side.style.width=''; side.style.height=''; setSaved({}); try{ map.invalidateSize(); }catch(_){ } });
  var rt; window.addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(applySaved,180); });
  applySaved();
})();
initEngage();

function dropLockscreen(){
  const ls=document.getElementById('lockscreen'); if(ls&&ls.parentNode) ls.parentNode.removeChild(ls);
}
function unlock(){
  const inp=document.getElementById('lockpass'), btn=document.getElementById('lockbtn'), err=document.getElementById('lockerr');
  const rem=document.getElementById('lockremc');
  const pass=canonCode(inp.value); if(!pass) return;
  btn.disabled=true; err.textContent='בודק…';
  _deriveKey(ENC, pass).then(function(key){
    return _decryptWith(ENC, key).then(function(d){
      DATA=d;
      // Storage failure must never block entry — the key store is a convenience.
      const store=(rem&&rem.checked)?kdbPut('payload',key):kdbDel('payload');
      return store.catch(function(){}).then(function(){ dropLockscreen(); boot(); });
    });
  }).catch(function(){
    btn.disabled=false; err.textContent='קוד שגוי — נסו שוב.'; inp.value=''; inp.focus();
  });
}
function armLockScreen(){
  const inp=document.getElementById('lockpass'), btn=document.getElementById('lockbtn');
  btn.addEventListener('click', unlock);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') unlock(); });
  const gb=document.getElementById('lockgoog'); if(gb) gb.addEventListener('click', googleUnlock);
  setTimeout(function(){ try{ inp.focus(); }catch(_){} }, 60);
}
if(LOCKED){
  // Silent auto-unlock with the device-stored key; any failure (no key, key from a
  // rotated passphrase, blocked IndexedDB) falls back to the normal code prompt.
  kdbGet('payload').then(function(key){
    if(!key) throw 0;
    return _decryptWith(ENC, key).then(function(d){ DATA=d; dropLockscreen(); boot(); });
  }).catch(function(e){
    if(e!==0){ kdbDel('payload').catch(function(){}); }
    armLockScreen();
  });
} else {
  boot();
}

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
